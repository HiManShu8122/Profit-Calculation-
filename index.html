<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dukaan Profit Calculator ✨ AI Power</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; font-family: sans-serif; }
        .card { background: white; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); transition: all 0.3s ease; }
        .card:hover { transform: translateY(-2px); }
        .ai-gradient { background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%); }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top: 3px solid #fff; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-3xl mx-auto">
        <!-- Header -->
        <div class="text-center mb-10">
            <h1 class="text-4xl font-extrabold text-slate-900 mb-2">Dukaan Profit Manager</h1>
            <p class="text-slate-600">Apni dukaan ka hisaab rakhein aur ✨ AI se business badhayein</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Left Side: Input Forms -->
            <div class="space-y-6">
                <!-- Purchase Section -->
                <div class="card p-6 border-t-4 border-blue-500">
                    <h2 class="text-lg font-bold mb-4 text-blue-700 flex items-center">
                        <span class="mr-2">📦</span> Maal ki Khareed (Wholesale)
                    </h2>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase">Item ka Naam</label>
                            <input type="text" id="itemName" placeholder="Blouse, Fall, Saree..." class="w-full p-2.5 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-400 outline-none">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase">Total Qty (Lot)</label>
                                <input type="number" id="bulkQty" placeholder="100" class="w-full p-2.5 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-400 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase">Total Rate (₹)</label>
                                <input type="number" id="bulkPrice" placeholder="3000" class="w-full p-2.5 border rounded-lg mt-1 focus:ring-2 focus:ring-blue-400 outline-none">
                            </div>
                        </div>
                        <div class="bg-blue-50 p-3 rounded-lg flex items-center justify-between border border-blue-100">
                            <span class="text-sm font-bold text-blue-800">Unit Cost:</span>
                            <span id="unitCostDisplay" class="text-lg font-mono font-bold text-blue-900">₹0</span>
                        </div>
                    </div>
                </div>

                <!-- Sales Section -->
                <div class="card p-6 border-t-4 border-green-500">
                    <h2 class="text-lg font-bold mb-4 text-green-700 flex items-center">
                        <span class="mr-2">💰</span> Bikri (Retail Sale)
                    </h2>
                    <div class="space-y-4">
                        <div class="grid grid-cols-2 gap-3">
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase">Piece Beche</label>
                                <input type="number" id="soldQty" placeholder="8" class="w-full p-2.5 border rounded-lg mt-1 focus:ring-2 focus:ring-green-400 outline-none">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-500 uppercase">Rate/Piece (₹)</label>
                                <input type="number" id="sellPrice" placeholder="50" class="w-full p-2.5 border rounded-lg mt-1 focus:ring-2 focus:ring-green-400 outline-none">
                            </div>
                        </div>
                        <button onclick="calculate()" class="w-full bg-slate-800 text-white py-3 rounded-xl font-bold hover:bg-slate-900 transition">
                            Hisaab Nikaalein
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Side: Results & AI -->
            <div class="space-y-6">
                <!-- Results Section -->
                <div id="results" class="card p-6 bg-slate-900 text-white hidden">
                    <h2 class="text-xl font-bold mb-4 border-b border-slate-700 pb-2 flex justify-between">
                        Result <span>📊</span>
                    </h2>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400">Total Sale:</span>
                            <span id="totalSale" class="text-xl font-bold">₹0</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-slate-400">Items ki Cost:</span>
                            <span id="totalCost" class="font-bold text-red-400">₹0</span>
                        </div>
                        <div class="pt-4 border-t border-slate-800 flex justify-between items-center">
                            <span class="text-lg">Net Profit:</span>
                            <span id="netProfit" class="text-2xl font-bold text-green-400">₹0</span>
                        </div>
                        <div class="flex justify-between items-center bg-slate-800 p-2 rounded">
                            <span class="text-sm text-slate-400">Gross Margin:</span>
                            <span id="marginPerc" class="font-bold text-indigo-300 text-lg">0%</span>
                        </div>
                    </div>
                </div>

                <!-- ✨ AI Assistant Section -->
                <div class="card p-6 ai-gradient text-white overflow-hidden relative">
                    <div class="relative z-10">
                        <h2 class="text-xl font-bold mb-4 flex items-center">
                            ✨ AI Business Assistant
                        </h2>
                        <div class="grid grid-cols-1 gap-2 mb-4">
                            <button onclick="getAIAdvice()" id="adviceBtn" class="bg-white/20 hover:bg-white/30 p-3 rounded-lg text-sm font-bold flex items-center justify-center transition">
                                💡 ✨ Business Advice
                            </button>
                            <button onclick="generateAd()" id="adBtn" class="bg-white/20 hover:bg-white/30 p-3 rounded-lg text-sm font-bold flex items-center justify-center transition">
                                📢 ✨ Grahak Ke Liye Ad Banayein
                            </button>
                        </div>
                        
                        <div id="aiLoading" class="hidden flex items-center justify-center py-4">
                            <div class="spinner mr-3"></div>
                            <span>Gemini AI soch raha hai...</span>
                        </div>

                        <div id="aiResponse" class="hidden bg-black/20 p-4 rounded-lg text-sm italic leading-relaxed border border-white/10">
                            <!-- AI content goes here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // Runtime provides the key

        async function callGemini(prompt) {
            let retries = 0;
            const maxRetries = 5;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { 
                    parts: [{ text: "Aap ek professional retail business consultant hain. Hamesha Hindi (Latin script/Hinglish) mein jawab dein. Chhote aur practical points dein." }] 
                }
            };

            while (retries <= maxRetries) {
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) throw new Error('API Error');
                    
                    const result = await response.json();
                    return result.candidates?.[0]?.content?.parts?.[0]?.text;
                } catch (error) {
                    if (retries === maxRetries) throw error;
                    const delay = Math.pow(2, retries) * 1000;
                    await new Promise(res => setTimeout(res, delay));
                    retries++;
                }
            }
        }

        function calculate() {
            const bulkQty = parseFloat(document.getElementById('bulkQty').value) || 0;
            const bulkPrice = parseFloat(document.getElementById('bulkPrice').value) || 0;
            const soldQty = parseFloat(document.getElementById('soldQty').value) || 0;
            const sellPrice = parseFloat(document.getElementById('sellPrice').value) || 0;

            if (bulkQty <= 0) {
                showAIError("Pehle wholesale ki details bhariye.");
                return;
            }

            const unitCost = bulkPrice / bulkQty;
            const totalSale = soldQty * sellPrice;
            const totalCostOfSoldItems = soldQty * unitCost;
            const profit = totalSale - totalCostOfSoldItems;
            const margin = totalSale > 0 ? (profit / totalSale) * 100 : 0;

            document.getElementById('unitCostDisplay').innerText = "₹" + unitCost.toFixed(2);
            document.getElementById('totalSale').innerText = "₹" + totalSale.toFixed(2);
            document.getElementById('totalCost').innerText = "₹" + totalCostOfSoldItems.toFixed(2);
            document.getElementById('netProfit').innerText = "₹" + profit.toFixed(2);
            document.getElementById('marginPerc').innerText = margin.toFixed(2) + "%";

            document.getElementById('results').classList.remove('hidden');
        }

        async function getAIAdvice() {
            const name = document.getElementById('itemName').value || "item";
            const cost = document.getElementById('unitCostDisplay').innerText;
            const price = document.getElementById('sellPrice').value;
            const margin = document.getElementById('marginPerc').innerText;

            if (price === "0" || !price) {
                showAIError("Pehle Selling Price daaliye tabhi AI advice de payega.");
                return;
            }

            toggleAILoading(true);
            const prompt = `Meri shop mein maine ${name} becha hai. Iska cost price ${cost} hai aur maine ise ₹${price} mein becha. Mera margin ${margin} hai. Kya ye margin sahi hai? Mujhe 3 practical tips dijiye profit badhane ke liye.`;
            
            try {
                const advice = await callGemini(prompt);
                showAIResult(advice);
            } catch (e) {
                showAIError("Maaf kijiye, AI se sampark nahi ho pa raha. Thodi der baad try karein.");
            } finally {
                toggleAILoading(false);
            }
        }

        async function generateAd() {
            const name = document.getElementById('itemName').value || "Kapde";
            const price = document.getElementById('sellPrice').value;

            if (!price || price === "0") {
                showAIError("Selling price batayein taaki ad mein daal sakein.");
                return;
            }

            toggleAILoading(true);
            const prompt = `Ek bahut hi attractive 2-line WhatsApp advertisement likhiye meri kapdo ki shop ke liye. Product hai: ${name} aur rate hai: ₹${price}. Thode emojis bhi use kijiye.`;
            
            try {
                const ad = await callGemini(prompt);
                showAIResult(ad);
            } catch (e) {
                showAIError("Ad generate nahi ho paya. Dobara koshish karein.");
            } finally {
                toggleAILoading(false);
            }
        }

        function toggleAILoading(show) {
            document.getElementById('aiLoading').classList.toggle('hidden', !show);
            document.getElementById('aiResponse').classList.toggle('hidden', show);
            document.getElementById('adviceBtn').disabled = show;
            document.getElementById('adBtn').disabled = show;
        }

        function showAIResult(text) {
            const resDiv = document.getElementById('aiResponse');
            resDiv.innerText = text;
            resDiv.classList.remove('hidden');
        }

        function showAIError(msg) {
            const resDiv = document.getElementById('aiResponse');
            resDiv.innerText = "❌ " + msg;
            resDiv.classList.remove('hidden');
        }

        // Auto update unit cost
        document.getElementById('bulkQty').addEventListener('input', updateUnitCost);
        document.getElementById('bulkPrice').addEventListener('input', updateUnitCost);

        function updateUnitCost() {
            const bq = parseFloat(document.getElementById('bulkQty').value) || 0;
            const bp = parseFloat(document.getElementById('bulkPrice').value) || 0;
            if (bq > 0) {
                document.getElementById('unitCostDisplay').innerText = "₹" + (bp/bq).toFixed(2);
            }
        }
    </script>
</body>
</html>
